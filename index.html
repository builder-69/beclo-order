<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베클로 발주서 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/officecrypto-tool/dist/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --surface2: #FAFAF8;
    --border: #E2E0D8;
    --border2: #C8C5BA;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #A8A59E;
    --accent: #2D5016;
    --accent-bg: #EEF4E8;
    --accent-light: #C5DBA8;
    --warn: #7A3D00;
    --warn-bg: #FFF3E8;
    --warn-light: #FFCB96;
    --error: #6B1010;
    --error-bg: #FFF0F0;
    --success: #1A4D0A;
    --success-bg: #EDFCE5;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  header {
    background: var(--accent);
    color: white;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo span {
    opacity: 0.6;
    font-weight: 400;
    margin-left: 8px;
    font-size: 13px;
  }
  .header-badge {
    font-size: 11px;
    background: rgba(255,255,255,0.15);
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: 0.3px;
  }

  /* Layout */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .section-num {
    width: 26px;
    height: 26px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .section-desc {
    font-size: 12px;
    color: var(--text3);
    margin-left: auto;
  }

  /* Google Sheets Input */
  .sheets-input-wrap {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .sheets-input {
    flex: 1;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .sheets-input:focus { border-color: var(--accent); background: white; }
  .sheets-input::placeholder { color: var(--text3); }
  .btn {
    padding: 11px 18px;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #1e3a0f; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-secondary {
    background: white;
    color: var(--text);
    border-color: var(--border2);
  }
  .btn-secondary:hover { background: var(--surface2); }

  .sheets-status {
    margin-top: 10px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border2);
    flex-shrink: 0;
  }
  .status-dot.ok { background: #4CAF50; }
  .status-dot.err { background: #E53935; }
  .status-dot.loading { background: var(--warn-light); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* File Upload */
  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  @media(max-width:640px){ .upload-grid { grid-template-columns: 1fr; } }

  .upload-card {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    background: var(--surface2);
  }
  .upload-card:hover { border-color: var(--accent); background: var(--accent-bg); }
  .upload-card.has-file { border-color: var(--accent-light); border-style: solid; background: var(--accent-bg); }
  .upload-card.drag-over { border-color: var(--accent); background: var(--accent-bg); transform: scale(1.01); }
  .upload-card input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 22px; margin-bottom: 8px; }
  .upload-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    margin-bottom: 4px;
    letter-spacing: 0.2px;
  }
  .upload-sub { font-size: 11px; color: var(--text3); }
  .upload-filename {
    font-size: 11px;
    color: var(--accent);
    font-family: var(--mono);
    margin-top: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Generate Button */
  .generate-wrap {
    display: flex;
    justify-content: center;
    padding: 8px 0;
  }
  .btn-generate {
    padding: 14px 48px;
    font-size: 15px;
    font-weight: 700;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.2px;
    box-shadow: 0 4px 16px rgba(45,80,22,0.25);
  }
  .btn-generate:hover { background: #1e3a0f; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(45,80,22,0.3); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Progress */
  .progress-wrap { display: none; margin-top: 16px; }
  .progress-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 12px;
    color: var(--text2);
    margin-top: 8px;
    text-align: center;
  }

  /* Result */
  .result-section { display: none; }
  .result-meta {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  @media(max-width:520px){ .result-meta { grid-template-columns: 1fr 1fr; } }
  .meta-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .meta-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.3px; }
  .meta-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .meta-value.ok { color: var(--success); }
  .meta-value.warn { color: var(--warn); }

  /* Validation Banner */
  .validation-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-size: 13px;
    font-weight: 500;
  }
  .validation-banner.pass { background: var(--success-bg); color: var(--success); }
  .validation-banner.fail { background: var(--warn-bg); color: var(--warn); }
  .validation-icon { font-size: 18px; }

  /* Supplier Tabs */
  .supplier-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .tab {
    padding: 7px 14px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--text2);
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .tab:hover:not(.active) { border-color: var(--border2); background: var(--surface2); }

  /* Output Text */
  .output-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 200px;
    max-height: 500px;
    overflow-y: auto;
    color: var(--text);
  }

  .copy-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .copy-label { font-size: 12px; color: var(--text3); }
  .btn-copy {
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    background: white;
    color: var(--accent);
    border: 1.5px solid var(--accent-light);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-copy:hover { background: var(--accent-bg); }

  /* Download */
  .download-bar {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  /* Warning Section */
  .warning-section {
    margin-top: 20px;
  }
  .warning-item {
    background: var(--warn-bg);
    border: 1px solid var(--warn-light);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--warn);
    margin-bottom: 8px;
    line-height: 1.7;
  }
  .warning-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--warn);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Error */
  .error-box {
    background: var(--error-bg);
    border: 1px solid #FFCDD2;
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 13px;
    color: var(--error);
    display: none;
  }

  /* Guide box */
  .guide-box {
    background: var(--accent-bg);
    border: 1px solid var(--accent-light);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 12px;
    color: var(--accent);
    line-height: 1.7;
  }
  .guide-box a { color: var(--accent); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 12px 24px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.25s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">베클로 발주서 생성기 <span>BECLO Order System</span></div>
  <div class="header-badge">v2.0</div>
</header>

<div class="container">

  <!-- Step 1: Google Sheets -->
  <div class="section">
    <div class="section-header">
      <div class="section-num">1</div>
      <div class="section-title">거래처 상품리스트 연결</div>
      <div class="section-desc">Google Sheets 자동 연동</div>
    </div>

    <div class="guide-box" style="margin-bottom:16px;">
      구글 스프레드시트 공유 링크를 붙여넣으세요. <strong>파일 → 공유 → 링크 복사</strong>에서 얻을 수 있어요.<br>
      시트에는 <strong>상품리스트</strong>와 <strong>예외매핑</strong> 탭이 있어야 해요.
    </div>

    <div class="sheets-input-wrap">
      <input class="sheets-input" id="sheetsUrl" type="text"
        value="https://docs.google.com/spreadsheets/d/1KixBePRo6oGHc2NYui3JSM2z8-tmmx0uS0NgJiPXs_8/edit?usp=sharing">
      <button class="btn btn-primary" onclick="loadSheets()">불러오기</button>
    </div>
    <div class="sheets-status" id="sheetsStatus">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText" style="color:var(--text3)">연결 전</span>
    </div>
  </div>

  <!-- Step 2: 주문서 업로드 -->
  <div class="section">
    <div class="section-header">
      <div class="section-num">2</div>
      <div class="section-title">주문서 파일 업로드</div>
      <div class="section-desc">여러 파일 동시 가능</div>
    </div>

    <div class="upload-grid">
      <div style="display:flex; flex-direction:column; gap:8px;">
        <div class="upload-card" id="naverCard" ondragover="dragOver(event,'naverCard')" ondragleave="dragLeave('naverCard')" ondrop="dropFile(event,'naver')">
          <input type="file" accept=".xlsx,.xls,.csv" onchange="fileSelected(event,'naver')" multiple>
          <div class="upload-icon">🛒</div>
          <div class="upload-label">네이버 스마트스토어</div>
          <div class="upload-sub">스마트스토어_주문.xlsx</div>
          <div class="upload-filename" id="naverName"></div>
        </div>
        <div style="display:flex; align-items:center; gap:8px; padding:0 4px;">
          <label style="font-size:12px; color:var(--text2); white-space:nowrap;">🔒 비밀번호</label>
          <input id="naverPassword" type="text" value="1111"
            style="flex:1; padding:7px 10px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:13px; font-family:var(--mono); background:var(--surface2); color:var(--text); outline:none;"
            placeholder="비밀번호 입력">
          <label style="display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text2); cursor:pointer; white-space:nowrap;">
            <input type="checkbox" id="naverNoPassword" onchange="toggleNaverPassword(this)"
              style="width:14px; height:14px; cursor:pointer; accent-color:var(--accent);">
            없음
          </label>
        </div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <div class="upload-card" id="hyberCard" ondragover="dragOver(event,'hyberCard')" ondragleave="dragLeave('hyberCard')" ondrop="dropFile(event,'hyber')">
          <input type="file" accept=".xlsx,.xls,.csv,.zip" onchange="fileSelected(event,'hyber')" multiple>
          <div class="upload-icon">👗</div>
          <div class="upload-label">하이버</div>
          <div class="upload-sub">.xlsx / .csv / .zip</div>
          <div class="upload-filename" id="hyberName"></div>
        </div>
        <div style="display:flex; align-items:center; gap:8px; padding:0 4px;">
          <label style="font-size:12px; color:var(--text2); white-space:nowrap;">🔒 ZIP 비밀번호</label>
          <input id="hyberPassword" type="password" value="Ensensthth6923!"
            style="flex:1; padding:7px 10px; border:1.5px solid var(--border); border-radius:var(--radius); font-size:13px; font-family:var(--mono); background:var(--surface2); color:var(--text); outline:none;"
            placeholder="ZIP 파일일 때만 입력">
        </div>
      </div>
      <div class="upload-card" id="ablyCard" ondragover="dragOver(event,'ablyCard')" ondragleave="dragLeave('ablyCard')" ondrop="dropFile(event,'ably')">
        <input type="file" accept=".xlsx,.xls,.csv" onchange="fileSelected(event,'ably')" multiple>
        <div class="upload-icon">✨</div>
        <div class="upload-label">에이블리</div>
        <div class="upload-sub">에이블리_발송관리.xlsx</div>
        <div class="upload-filename" id="ablyName"></div>
      </div>
    </div>
  </div>

  <!-- Step 3: 생성 -->
  <div class="section">
    <div class="section-header">
      <div class="section-num">3</div>
      <div class="section-title">발주서 생성</div>
    </div>
    <div class="generate-wrap">
      <button class="btn-generate" id="generateBtn" onclick="generate()">발주서 생성하기</button>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">처리 중...</div>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Result -->
  <div class="section result-section" id="resultSection">
    <div class="section-header">
      <div class="section-num">✓</div>
      <div class="section-title">발주서 완성</div>
    </div>

    <div class="result-meta" id="resultMeta"></div>
    <div id="validationBanner"></div>

    <div class="supplier-tabs" id="supplierTabs"></div>

    <div class="copy-bar">
      <span class="copy-label" id="currentSupplierLabel"></span>
      <button class="btn-copy" onclick="copyCurrentTab()">📋 복사</button>
    </div>
    <div class="output-box" id="outputBox"></div>

    <div class="download-bar">
      <button class="btn btn-secondary" onclick="downloadAll()">⬇ 전체 발주서 다운로드 (.txt)</button>
    </div>

    <div class="warning-section" id="warningSection"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════════
const state = {
  mapping: null,        // DataFrame (rows array)
  exceptionMap: null,   // dict
  naverFiles: [],
  hyberFiles: [],
  ablyFiles: [],
  result: {},
  needsReview: [],
  noMapping: [],
  outputBySupplier: {},
  fullOutput: '',
  currentTab: null,
};

// ═══════════════════════════════════════════════
// helpers.js 포팅
// ═══════════════════════════════════════════════
function normalize(s) {
  return String(s).replace(/\s/g,'').replace(/\//g,'').replace(/-/g,'').replace(/_/g,'').toLowerCase().trim();
}

function cleanColorForOutput(color) {
  color = String(color).trim();
  const keywords = ['SET','set','Set','팬츠','셔츠','자켓','투턱','원턱','바람막이','바지'];
  for (const kw of keywords) color = color.split(kw).join('');
  return color.replace(/\s+/g,' ').trim();
}

function normalizeSize(s) {
  s = String(s).trim();
  const norm = s.replace(/\s/g,'').toLowerCase();
  if (['onesize','free','freesize'].includes(norm)) return '';
  return s;
}

function splitCsv(s) {
  s = String(s).trim();
  if (!s || s === 'undefined' || s === 'null') return [];
  return s.split(',').map(x=>x.trim()).filter(Boolean);
}

function parsePlatformColor(c) {
  return String(c).trim().replace(/^\([^)]+\)\s*/,'');
}

function cleanPrefixParens(s) {
  return String(s).trim().replace(/^\([^)]+\)\s*/,'');
}

function parsePlatformSize(s) {
  s = s.trim();
  let m = s.match(/^((?:\d+)?XL|XS|[SML])\s*[\(\[].*/i);
  if (m) return m[1].toUpperCase();
  m = s.match(/^((?:\d+)?XL|XS|[SML])\s*[\(\[ ]/i);
  return m ? m[1].toUpperCase() : s;
}

function stripLabel(s) {
  return s.trim().replace(/^(컬러|색상|사이즈|타입|선택\d*)\s*[:：]\s*/,'');
}

function splitSlashOutsideParens(s) {
  const parts = [];
  let depth = 0, current = '';
  for (const ch of s) {
    if ('(['.includes(ch)) { depth++; current += ch; }
    else if (')]'.includes(ch)) { depth--; current += ch; }
    else if (ch === '/' && depth === 0) { parts.push(current.trim()); current = ''; }
    else current += ch;
  }
  parts.push(current.trim());
  return parts.filter(Boolean);
}

function splitPlusOutsideParens(s) {
  const parts = [];
  let depth = 0, current = '';
  for (const ch of s) {
    if ('(['.includes(ch)) { depth++; current += ch; }
    else if (')]'.includes(ch)) { depth--; current += ch; }
    else if (ch === '+' && depth === 0) { parts.push(current.trim()); current = ''; }
    else current += ch;
  }
  parts.push(current.trim());
  return parts.filter(Boolean);
}

function parseOptionItems(옵션) {
  옵션 = 옵션.trim();
  const rawParts = splitSlashOutsideParens(옵션);
  const colorLabels = new Set(['컬러','색상']);
  const sizeLabels = new Set(['사이즈','크기']);
  const knownLabels = new Set(['컬러','색상','사이즈','크기','타입','안감']);

  let hasKnownLabel = false;
  for (const part of rawParts) {
    if (/^(컬러|색상|사이즈|크기|타입|안감|선택\d*)\s*[:：]/.test(part)) {
      hasKnownLabel = true; break;
    }
  }

  if (hasKnownLabel) {
    const cleanedRaw = rawParts.map(part => {
      const m = part.match(/^(컬러|색상)\s*[:：]\s*(.+)$/);
      if (m) {
        const val = m[2].replace(/\s*\([^)]*\)/g,'').trim();
        return `${m[1]}: ${val}`;
      }
      return part;
    });

    const labelMap = {};
    const extraKeywords = [];
    for (const part of cleanedRaw) {
      const m = part.match(/^(컬러|색상|사이즈|크기|타입|선택\d*)\s*[:：]\s*(.+)$/);
      if (m) {
        const key = m[1].trim(), val = m[2].trim();
        if (colorLabels.has(key)) labelMap['컬러'] = val;
        else if (sizeLabels.has(key)) labelMap['사이즈'] = val;
        else extraKeywords.push(val);
      } else {
        const m2 = part.match(/^[^:：]+\s*[:：]\s*(.+)$/);
        extraKeywords.push(m2 ? m2[1].trim() : part);
      }
    }

    if (labelMap['컬러'] || labelMap['사이즈']) {
      const color = labelMap['컬러'] || '';
      const sizeRaw = labelMap['사이즈'] || '';
      let sizeClean = sizeRaw.replace(/[\(\[].*/,'').trim().toUpperCase().replace(/-$/,'');
      const size = normalizeSize(sizeClean);
      const keyword = extraKeywords.join(' ');
      const plusParts = splitPlusOutsideParens(keyword);
      if (plusParts.length > 1) {
        const cleaned = plusParts.map(p => p.replace(/\([^)]*\)/g,'').replace(/\s*(세트|단품)\s*/g,'').trim()).filter(Boolean);
        return cleaned.map(p => [p, cleanPrefixParens(color), size]);
      }
      return [[keyword, cleanPrefixParens(color), size]];
    }
  }

  const slashParts = rawParts.map(p => stripLabel(p.trim()));

  if (slashParts.length === 2) {
    const second = slashParts[1];
    const sizeClean = second.replace(/[\(\[].*/,'').trim();
    if (/^((?:\d+)?XL|XS|[SML])$/i.test(sizeClean)) {
      return [['', cleanPrefixParens(slashParts[0]), normalizeSize(sizeClean.toUpperCase())]];
    }
  }

  if (slashParts.length === 3) {
    const last = slashParts[2];
    const sizeClean = last.replace(/[\(\[].*/,'').trim();
    if (/^((?:\d+)?XL|XS|[SML])$/i.test(sizeClean)) {
      return [[slashParts[0], cleanPrefixParens(slashParts[1]), normalizeSize(sizeClean.toUpperCase())]];
    }
  }

  const results = [];
  for (const part of slashParts) {
    let keyword = '', content = part;
    const mParen = part.match(/\(([^)]+)\)/);
    if (mParen) {
      const pc = mParen[1].trim();
      if (!/^[\d~\-\+]+$/.test(pc)) keyword = pc;
      content = part.replace(mParen[0],'').trim().replace(/^[^:：]+\s*[:：]\s*/,'');
    }
    if (!keyword) {
      const mColon = content.match(/^([^:：]+)\s*[:：]\s*(.+)$/);
      if (mColon) { keyword = mColon[1].trim(); content = mColon[2].trim(); }
    }
    const mHyphen = content.match(/^(.+?)[- ]((?:\d+)?XL|XS|[SML])(\s*[\(\[].*)?$/i);
    if (mHyphen) {
      results.push([keyword, cleanPrefixParens(mHyphen[1].trim()), normalizeSize(mHyphen[2].toUpperCase())]);
      continue;
    }
    const words = content.split(' ');
    if (words.length >= 3) {
      const lastWord = words[words.length-1];
      const sizeClean = lastWord.replace(/[\(\[].*/,'').trim();
      if (/^((?:\d+)?XL|XS|[SML])$/i.test(sizeClean)) {
        const size = normalizeSize(sizeClean.toUpperCase());
        const front = words.slice(0,-1).join(' ');
        let kw = keyword, color;
        if (kw) { color = front; }
        else {
          const fw = front.split(' ');
          if (fw.length >= 2) { kw = fw[0]; color = fw.slice(1).join(' '); }
          else color = front;
        }
        results.push([kw, cleanPrefixParens(color), size]);
        continue;
      }
    }
    const mBracket = content.match(/^(.+?)\s+((?:\d+)?XL|XS|[SML])\s*[\(\[].*?[\)\]]?\s*$/i);
    if (mBracket) { results.push([keyword, cleanPrefixParens(mBracket[1].trim()), normalizeSize(mBracket[2].toUpperCase())]); continue; }
    const mBracket2 = content.match(/^(.+?)\s+((?:\d+)?XL|XS|[SML])\s*[\(\[ ]/i);
    if (mBracket2) { results.push([keyword, cleanPrefixParens(mBracket2[1].trim()), normalizeSize(mBracket2[2].toUpperCase())]); continue; }
    const mSimple = content.match(/^(.+?)\s+((?:\d+)?XL|XS|[SML])$/i);
    if (mSimple) { results.push([keyword, cleanPrefixParens(mSimple[1].trim()), normalizeSize(mSimple[2].toUpperCase())]); continue; }
    results.push([keyword, cleanPrefixParens(content), '']);
  }
  return results;
}

function loadExceptionMapping(rows) {
  const map = {};
  for (const r of rows) {
    const 거래처상품명 = String(r['거래처 상품명']||'').trim();
    if (!거래처상품명 || 거래처상품명==='undefined') continue;
    let 거래처상품번호 = String(r['거래처 상품번호']||'').trim();
    try { 거래처상품번호 = String(parseInt(parseFloat(거래처상품번호))); } catch {}

    const platforms = [
      ['naver', '네이버 상품번호', '네이버 추가옵션'],
      ['hyber', '하이버 상품번호', '하이버 추가옵션'],
      ['ably',  '에이블리 상품코드', '에이블리 추가옵션'],
    ];
    for (const [plat, numCol, optCol] of platforms) {
      const numRaw = r[numCol], optRaw = r[optCol];
      if (numRaw == null || optRaw == null || numRaw==='' || optRaw==='') continue;
      let num;
      try { num = String(parseInt(parseFloat(numRaw))); } catch { num = String(numRaw).trim(); }
      const opt = String(optRaw).trim();
      if (!num || num==='NaN') continue;
      const key = `${plat}|${num}|${opt}`;
      if (!map[key]) map[key] = [];
      map[key].push([거래처상품명, 거래처상품번호]);
    }
  }
  return map;
}

function buildMapping(rows) {
  const result = [];
  for (const r of rows) {
    const 거래처명 = String(r['거래처명']||'').trim();
    if (!거래처명 || 거래처명==='undefined') continue;
    const 거래처상품번호 = String(r['거래처 상품번호']||'').trim();
    let 거래처상품명 = String(r['거래처 상품명']||'').trim();
    if (!거래처상품명 || 거래처상품명==='undefined') {
      const n = String(r['네이버 상품명']||'').trim();
      거래처상품명 = n ? `(거래처 상품명 확인) ${n}` : '';
    }

    const dColors = splitCsv(r['거래처 컬러']);
    const dSizes  = splitCsv(r['거래처 사이즈']);

    const platforms = [
      ['naver', '네이버 상품번호',   null,              '네이버 컬러',   '네이버 사이즈',   '네이버 추가옵션'],
      ['hyber', '하이버 상품번호',   null,              '하이버 컬러',   '하이버 사이즈',   '하이버 추가옵션'],
      ['ably',  '에이블리 상품번호', '에이블리 상품코드', '에이블리 컬러', '에이블리 사이즈', '에이블리 추가옵션'],
    ];

    for (const [플랫폼, 번호col, 코드col, 컬러col, 사이즈col, 옵션col] of platforms) {
      let 매칭키;
      if (코드col) {
        매칭키 = String(r[코드col]||'').trim();
        if (!매칭키 || 매칭키==='undefined') {
          try { 매칭키 = String(parseInt(parseFloat(r[번호col]))); } catch { 매칭키 = String(r[번호col]||'').trim(); }
        }
      } else {
        try { 매칭키 = String(parseInt(parseFloat(r[번호col]))); } catch { 매칭키 = String(r[번호col]||'').trim(); }
      }
      if (!매칭키 || 매칭키==='undefined' || 매칭키==='NaN') continue;

      const pColorsRaw = splitCsv(r[컬러col]);
      const pSizesRaw  = splitCsv(r[사이즈col]);
      let 추가옵션 = String(r[옵션col]||'').trim();
      if (추가옵션==='undefined') 추가옵션='';

      const pColors = pColorsRaw.map(parsePlatformColor);
      const pSizes  = pSizesRaw.map(parsePlatformSize);

      const useColors = dColors.length ? dColors : pColors.length ? pColors : [''];
      const useSizes  = dSizes.length  ? dSizes  : pSizes.length  ? pSizes  : [''];

      const loopColors = pColors.length ? pColors : [''];
      for (let i=0; i<loopColors.length; i++) {
        const 거래처컬러 = i < useColors.length ? useColors[i] : useColors[useColors.length-1] || '';
        result.push({
          플랫폼, 플랫폼상품번호: 매칭키, 거래처명, '거래처 상품번호': 거래처상품번호,
          거래처상품명, 플랫폼컬러: loopColors[i],
          거래처컬러, 플랫폼사이즈리스트: pSizes, 거래처사이즈리스트: useSizes, 추가옵션,
        });
      }
    }
  }
  return result;
}

// process.js 포팅
// ═══════════════════════════════════════════════
function processOrders(naverData, hyberData, ablyData, mapping, exceptionMap) {
  const result = {};     // {거래처명: {상품명: {사이즈|컬러: 수량}}}
  const needsReview = [];
  const noMapping = [];

  function addResult(거래처명, 상품명, 사이즈, 컬러, qty) {
    if (!result[거래처명]) result[거래처명] = {};
    if (!result[거래처명][상품명]) result[거래처명][상품명] = {};
    const k = `${사이즈}|||${컬러}`;
    result[거래처명][상품명][k] = (result[거래처명][상품명][k]||0) + qty;
  }

  function processRows(rows, 플랫폼, 번호col, 옵션col, 수량col) {
    for (const row of rows) {
      let 상품번호;
      try {
        상품번호 = 플랫폼!=='ably' ? String(parseInt(parseFloat(row[번호col]))).trim() : String(row[번호col]).trim();
      } catch { continue; }
      if (!상품번호 || 상품번호==='NaN') continue;

      const 옵션str = String(row[옵션col]||'').trim();
      if (!옵션str || 옵션str==='undefined') continue;

      let 수량;
      try { 수량 = parseInt(row[수량col]); if (isNaN(수량)) 수량=1; } catch { 수량=1; }

      // 예외매핑
      const matchedExceptions = [];
      for (const [key, products] of Object.entries(exceptionMap)) {
        const [ep, en, ek] = key.split('|');
        if (ep===플랫폼 && en===상품번호) {
          for (const [pName, pNum] of products) matchedExceptions.push([pName, pNum, ek]);
        }
      }

      if (matchedExceptions.length) {
        const items = parseOptionItems(옵션str);
        const isMulti = items.length > 1;
        for (const [키워드, 플랫폼컬러, optSize] of items) {
          let matchedList = [];
          if (키워드) {
            for (const [n, num, ek] of matchedExceptions) {
              if (normalize(ek)===normalize(키워드)) matchedList.push([n,num]);
            }
            if (!matchedList.length) {
              for (const [n, num, ek] of matchedExceptions) {
                if (normalize(ek).includes(normalize(키워드))) matchedList.push([n,num]);
              }
            }
          }
          if (!matchedList.length && !isMulti) {
            for (const [n, num, ek] of matchedExceptions) {
              if (normalize(ek).includes(normalize(옵션str))) matchedList.push([n,num]);
            }
          }
          for (const [matched, matchedNum] of matchedList) {
            let numStr;
            try { numStr = String(parseInt(parseFloat(matchedNum))); } catch { numStr=matchedNum; }
            const cands = mapping.filter(m => String(m['거래처 상품번호']).trim()===numStr);
            if (!cands.length) { needsReview.push({상품번호, 옵션:옵션str, 수량, 플랫폼}); continue; }
            const 거래처명 = cands[0].거래처명;
            let 거래처컬러;
            if (플랫폼컬러) {
              const cm = cands.find(m=>m.플랫폼컬러===플랫폼컬러);
              거래처컬러 = cm ? cm.거래처컬러 : 플랫폼컬러;
            } else {
              거래처컬러 = '[컬러 확인 필요]';
            }
            const qty = isMulti ? 1 : 수량;
            addResult(거래처명, matched, optSize||'', 거래처컬러, qty);
          }
        }
        continue;
      }

      // 일반 매핑
      const cands = mapping.filter(m=>m.플랫폼===플랫폼 && m.플랫폼상품번호===상품번호);
      if (!cands.length) { noMapping.push({상품번호, 옵션:옵션str, 수량, 플랫폼}); continue; }

      const items = parseOptionItems(옵션str);
      const isMulti = items.length > 1;
      for (const [키워드, 플랫폼컬러, optSize] of items) {
        let match;
        if (플랫폼컬러) {
          match = cands.find(m=>m.플랫폼컬러===플랫폼컬러) || cands[0];
        } else {
          match = cands[0];
        }
        const 거래처컬러 = 플랫폼컬러 ? match.거래처컬러 : '[컬러 확인 필요]';
        const qty = isMulti ? 1 : 수량;
        addResult(match.거래처명, match.거래처상품명, optSize||'', 거래처컬러, qty);
      }
    }
  }

  processRows(naverData, 'naver', '상품번호', '옵션정보', '수량');
  processRows(hyberData, 'hyber', '상품번호', '옵션정보', '수량');
  processRows(ablyData,  'ably',  '판매자 상품코드', '옵션 정보', '수량');

  return {result, needsReview, noMapping};
}

// ═══════════════════════════════════════════════
// output.js 포팅
// ═══════════════════════════════════════════════
const SIZE_ORDER = {XS:0,S:1,M:2,L:3,XL:4,'2XL':5,'3XL':6};

function generateOutput(result, needsReview, noMapping, validationSummary) {
  const lines = [];
  const outputBySupplier = {};

  if (validationSummary) {
    lines.push('='.repeat(60));
    lines.push('수량 검수 결과');
    lines.push('='.repeat(60));
    lines.push('');
    lines.push(`* 주문서: ${validationSummary.주문서_총수량}개 (${validationSummary.주문서_상세})`);
    lines.push(`* 발주서: ${validationSummary.발주서_총수량}개 (${validationSummary.발주서_상세})`);
    lines.push(`* 거래처 수: ${Object.keys(result).length}개`);
    lines.push('');
    if (validationSummary.검수_통과) lines.push('✅ 검수 통과');
    else lines.push(`⚠️  수량 불일치: 차이 ${validationSummary.차이}개`);
    lines.push('='.repeat(60));
    lines.push('');
  }

  for (const 거래처명 of Object.keys(result).sort()) {
    const sl = [];
    sl.push(`[${거래처명}]`);
    sl.push('');
    sl.push('안녕하세요.');
    sl.push('');

    for (const [상품명, items] of Object.entries(result[거래처명])) {
      const total = Object.values(items).reduce((a,b)=>a+b,0);
      sl.push(`# ${상품명} (총 ${total}개)`);

      const sizeGroups = {};
      for (const [k, qty] of Object.entries(items)) {
        const [sz, color] = k.split('|||');
        if (!sizeGroups[sz]) sizeGroups[sz] = [];
        sizeGroups[sz].push([color, qty]);
      }
      const sortedSizes = Object.keys(sizeGroups).sort((a,b) => {
        const ai = a ? (SIZE_ORDER[a.toUpperCase()]??99) : -1;
        const bi = b ? (SIZE_ORDER[b.toUpperCase()]??99) : -1;
        return ai - bi;
      });
      for (const sz of sortedSizes) {
        for (const [color, qty] of sizeGroups[sz]) {
          const colorClean = cleanColorForOutput(color);
          sl.push(sz ? `${colorClean} ${sz} ${qty}` : `${colorClean} ${qty}`);
        }
      }
      sl.push('');
    }
    sl.push('주문부탁드립니다.');
    sl.push('');

    outputBySupplier[거래처명] = sl.join('\n');
    lines.push(...sl);
  }

  if (needsReview.length) {
    lines.push('[확인 필요]');
    for (const item of needsReview)
      lines.push(`상품번호: ${item.상품번호} / 옵션: ${item.옵션} / 수량: ${item.수량} (${item.플랫폼})`);
    lines.push('─'.repeat(30));
    lines.push('');
  }
  if (noMapping.length) {
    lines.push('[매핑 정보 없음 — 거래처 상품리스트에 등록 필요]');
    for (const item of noMapping)
      lines.push(`상품번호: ${item.상품번호} / 옵션: ${item.옵션} / 수량: ${item.수량} (${item.플랫폼})`);
    lines.push('─'.repeat(30));
  }

  return {fullOutput: lines.join('\n'), outputBySupplier};
}

function validateQuantities(naverData, hyberData, ablyData, result, noMapping, exceptionMap) {
  function calcQty(rows, 옵션col, 수량col, 번호col, platform) {
    let total = 0;
    for (const row of rows) {
      const 옵션str = String(row[옵션col]||'').trim();
      if (!옵션str || 옵션str==='undefined') continue;
      let qty;
      try { qty=parseInt(row[수량col]); if(isNaN(qty))qty=1; } catch { qty=1; }
      let 상품번호;
      try {
        상품번호 = platform!=='ably' ? String(parseInt(parseFloat(row[번호col]))).trim() : String(row[번호col]).trim();
      } catch { 상품번호=String(row[번호col]||'').trim(); }

      let matchedCount = 0, matchedEx = false;
      for (const [key, products] of Object.entries(exceptionMap)) {
        const [ep,en,ek] = key.split('|');
        if (ep===platform && en===상품번호 && 옵션str.includes(ek)) {
          matchedCount += products.length;
          matchedEx = true;
        }
      }
      if (matchedEx) total += qty * matchedCount;
      else { const items=parseOptionItems(옵션str); total += qty*items.length; }
    }
    return total;
  }

  function calcDisplay(rows, 옵션col, 수량col) {
    let t=0;
    for (const row of rows) {
      if (!String(row[옵션col]||'').trim()) continue;
      try { const q=parseInt(row[수량col]); t+=isNaN(q)?1:q; } catch { t+=1; }
    }
    return t;
  }

  const naverCalc = calcQty(naverData,'옵션정보','수량','상품번호','naver');
  const hyberCalc = calcQty(hyberData,'옵션정보','수량','상품번호','hyber');
  const ablyCalc  = calcQty(ablyData,'옵션 정보','수량','판매자 상품코드','ably');

  const naverDisp = calcDisplay(naverData,'옵션정보','수량');
  const hyberDisp = calcDisplay(hyberData,'옵션정보','수량');
  const ablyDisp  = calcDisplay(ablyData,'옵션 정보','수량');

  const 주문서_총수량 = naverDisp+hyberDisp+ablyDisp;

  let 발주서_정상 = 0;
  for (const [,상품들] of Object.entries(result))
    for (const [,items] of Object.entries(상품들))
      발주서_정상 += Object.values(items).reduce((a,b)=>a+b,0);
  const 발주서_매핑없음 = noMapping.reduce((a,b)=>a+(b.수량||0),0);
  const 발주서_총수량 = 발주서_정상+발주서_매핑없음;

  const totalCalc = naverCalc+hyberCalc+ablyCalc;
  const 검수_통과 = totalCalc===발주서_총수량;

  const 주문서_parts=[];
  if(naverDisp>0) 주문서_parts.push(`네이버 ${naverDisp}`);
  if(hyberDisp>0) 주문서_parts.push(`하이버 ${hyberDisp}`);
  if(ablyDisp>0)  주문서_parts.push(`에이블리 ${ablyDisp}`);

  const 발주서_parts=[];
  if(naverCalc>0) 발주서_parts.push(`네이버 ${naverCalc}`);
  if(hyberCalc>0) 발주서_parts.push(`하이버 ${hyberCalc}`);
  if(ablyCalc>0)  발주서_parts.push(`에이블리 ${ablyCalc}`);

  return {
    주문서_총수량, 발주서_총수량,
    주문서_상세: 주문서_parts.join(' + '),
    발주서_상세: 발주서_parts.join(', '),
    검수_통과, 차이: Math.abs(totalCalc-발주서_총수량),
  };
}

// Google Sheets 로드
// ═══════════════════════════════════════════════
function extractSheetId(url) {
  const m = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  return m ? m[1] : null;
}

async function loadSheets() {
  const url = document.getElementById('sheetsUrl').value.trim();
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');

  if (!url) { showToast('구글 스프레드시트 URL을 입력하세요'); return; }
  const id = extractSheetId(url);
  if (!id) { showToast('올바른 구글 스프레드시트 URL이 아니에요'); return; }

  dot.className='status-dot loading';
  txt.textContent='불러오는 중...'; txt.style.color='var(--warn)';

  try {
    const csvUrl1 = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=상품리스트`;
    const csvUrl2 = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=예외매핑`;

    const [r1, r2] = await Promise.all([fetch(csvUrl1), fetch(csvUrl2)]);
    if (!r1.ok || !r2.ok) throw new Error('시트를 불러올 수 없어요. 공유 설정을 확인하세요.');

    const [csv1, csv2] = await Promise.all([r1.text(), r2.text()]);
    const mappingRows = parseCsv(csv1);
    const excRows = parseCsv(csv2);

    state.mapping = buildMapping(mappingRows);
    state.exceptionMap = loadExceptionMapping(excRows);

    dot.className='status-dot ok';
    txt.textContent=`연결 완료 — 상품 ${mappingRows.length}개, 예외매핑 ${excRows.length}개`;
    txt.style.color='var(--success)';
    showToast('거래처 상품리스트 불러오기 완료!');
  } catch(e) {
    dot.className='status-dot err';
    txt.textContent=`오류: ${e.message}`;
    txt.style.color='var(--error)';
  }
}

function parseCsv(text) {
  const lines = text.split('\n').filter(Boolean);
  if (lines.length < 2) return [];
  const headers = parseCsvLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCsvLine(line);
    const row = {};
    headers.forEach((h,i) => row[h.trim()] = vals[i]?.trim() ?? '');
    return row;
  });
}

function parseCsvLine(line) {
  const result = [];
  let current = '', inQuote = false;
  for (let i=0; i<line.length; i++) {
    const ch = line[i];
    if (ch==='"') {
      if (inQuote && line[i+1]==='"') { current+='"'; i++; }
      else inQuote = !inQuote;
    } else if (ch===',' && !inQuote) {
      result.push(current); current='';
    } else current += ch;
  }
  result.push(current);
  return result;
}

// ═══════════════════════════════════════════════
// 엑셀 파싱
// ═══════════════════════════════════════════════
async function readExcel(file, headerRow=0, password='') {
  return new Promise((resolve,reject) => {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        let arrayBuffer = e.target.result;
        // 비밀번호 있으면 해제 시도
        if (password) {
          try {
            // officecrypto-tool 사용 시도
            if (typeof OfficeCrypto !== 'undefined') {
              arrayBuffer = await OfficeCrypto.decrypt(arrayBuffer, {password});
            } else {
              // SheetJS 자체 password 옵션으로 시도
              const wb2 = XLSX.read(arrayBuffer, {type:'array', password});
              const ws2 = wb2.Sheets[wb2.SheetNames[0]];
              const data2 = XLSX.utils.sheet_to_json(ws2, {header:1, defval:''});
              if (data2.length <= headerRow) { resolve([]); return; }
              const headers2 = data2[headerRow];
              const rows2 = data2.slice(headerRow+1).map(row => {
                const obj = {};
                headers2.forEach((h,i) => obj[String(h).trim()] = row[i]??'');
                return obj;
              });
              resolve(rows2);
              return;
            }
          } catch(decryptErr) {
            // 비밀번호 해제 실패 시 SheetJS password 옵션으로 재시도
            try {
              const wb2 = XLSX.read(e.target.result, {type:'array', password});
              const ws2 = wb2.Sheets[wb2.SheetNames[0]];
              const data2 = XLSX.utils.sheet_to_json(ws2, {header:1, defval:''});
              if (data2.length <= headerRow) { resolve([]); return; }
              const headers2 = data2[headerRow];
              const rows2 = data2.slice(headerRow+1).map(row => {
                const obj = {};
                headers2.forEach((h,i) => obj[String(h).trim()] = row[i]??'');
                return obj;
              });
              resolve(rows2);
              return;
            } catch(e2) {
              reject(new Error('비밀번호가 올바르지 않거나 파일을 열 수 없어요.'));
              return;
            }
          }
        }
        const wb = XLSX.read(arrayBuffer, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (data.length <= headerRow) { resolve([]); return; }
        const headers = data[headerRow];
        const rows = data.slice(headerRow+1).map(row => {
          const obj = {};
          headers.forEach((h,i) => obj[String(h).trim()] = row[i]??'');
          return obj;
        });
        resolve(rows);
      } catch(err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

async function readHyberFile(file, password='') {
  const name = file.name.toLowerCase();

  // ZIP 파일 처리
  if (name.endsWith('.zip')) {
    const arrayBuffer = await file.arrayBuffer();
    const zip = new JSZip();
    let loaded;
    try {
      loaded = await zip.loadAsync(arrayBuffer, { password });
    } catch(e) {
      throw new Error('ZIP 비밀번호가 올바르지 않거나 파일을 열 수 없어요.');
    }
    // zip 안의 첫 번째 xlsx 또는 csv 파일 찾기
    const entries = Object.keys(loaded.files).filter(n =>
      !loaded.files[n].dir && (n.endsWith('.xlsx') || n.endsWith('.xls') || n.endsWith('.csv'))
    );
    if (!entries.length) throw new Error('ZIP 안에 엑셀/CSV 파일이 없어요.');
    const innerFile = loaded.files[entries[0]];
    const innerBuffer = await innerFile.async('arraybuffer');
    const innerName = entries[0].toLowerCase();
    if (innerName.endsWith('.csv')) {
      return parseCsvBuffer(innerBuffer);
    } else {
      return parseExcelBuffer(innerBuffer, 0);
    }
  }

  // CSV 파일 처리
  if (name.endsWith('.csv')) {
    const arrayBuffer = await file.arrayBuffer();
    return parseCsvBuffer(arrayBuffer);
  }

  // Excel 파일 처리
  const arrayBuffer = await file.arrayBuffer();
  return parseExcelBuffer(arrayBuffer, 0);
}

function parseCsvBuffer(arrayBuffer) {
  const decoder = new TextDecoder('utf-8');
  let text = decoder.decode(arrayBuffer);
  // EUC-KR 깨짐 감지 시 재시도
  if (text.includes('\ufffd')) {
    const decoder2 = new TextDecoder('euc-kr');
    text = decoder2.decode(arrayBuffer);
  }
  const rows = parseCsvText(text);
  if (rows.length < 2) return [];
  const headers = rows[0];
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[String(h).trim()] = String(row[i] ?? '').trim());
    return obj;
  });
}

function parseExcelBuffer(arrayBuffer, headerRow = 0) {
  const wb = XLSX.read(arrayBuffer, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
  if (data.length <= headerRow) return [];
  const headers = data[headerRow];
  return data.slice(headerRow + 1).map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[String(h).trim()] = row[i] ?? '');
    return obj;
  });
}

function parseCsvText(text) {
  const lines = text.split(/\r?\n/).filter(Boolean);
  return lines.map(line => parseCsvLine(line));
}

async function readAblyExcel(file) {
  return new Promise((resolve,reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const sheetName = wb.SheetNames.find(s=>s.includes('에이블리_발송 관리')) || wb.SheetNames[0];
        const ws = wb.Sheets[sheetName];
        const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        if (data.length < 2) { resolve([]); return; }
        const headers = data[0];
        const rows = data.slice(1).map(row => {
          const obj = {};
          headers.forEach((h,i) => obj[String(h).trim()] = row[i]??'');
          return obj;
        });
        resolve(rows);
      } catch(err) { reject(err); }
    };
    reader.readAsArrayBuffer(file);
  });
}

// ═══════════════════════════════════════════════
// 생성 실행
// ═══════════════════════════════════════════════
async function generate() {
  const errBox = document.getElementById('errorBox');
  errBox.style.display='none';

  if (!state.mapping || !state.exceptionMap) {
    showError('거래처 상품리스트가 연결되지 않았어요. 1단계에서 구글 시트를 먼저 불러오세요.');
    return;
  }
  const hasOrder = state.naverFiles.length||state.hyberFiles.length||state.ablyFiles.length;
  if (!hasOrder) {
    showError('주문서 파일을 하나 이상 업로드해주세요.');
    return;
  }

  setProgress(true);
  document.getElementById('generateBtn').disabled=true;
  document.getElementById('resultSection').style.display='none';

  try {
    setProgressVal(10,'주문서 파일 읽는 중...');
    const naverPassword = document.getElementById('naverPassword').value.trim();
    const naverData = [];
    for (const f of state.naverFiles) naverData.push(...await readExcel(f, 1, naverPassword));
    const hyberPassword = document.getElementById('hyberPassword').value.trim();
    const hyberData = [];
    for (const f of state.hyberFiles) hyberData.push(...await readHyberFile(f, hyberPassword));
    const ablyData = [];
    for (const f of state.ablyFiles) ablyData.push(...await readAblyExcel(f));

    setProgressVal(40,'주문서 처리 중...');
    const {result, needsReview, noMapping} = processOrders(
      naverData, hyberData, ablyData, state.mapping, state.exceptionMap
    );

    setProgressVal(70,'수량 검수 중...');
    const validation = validateQuantities(naverData, hyberData, ablyData, result, noMapping, state.exceptionMap);
    validation.거래처_수 = Object.keys(result).length;

    setProgressVal(90,'발주서 생성 중...');
    const {fullOutput, outputBySupplier} = generateOutput(result, needsReview, noMapping, validation);

    state.result = result;
    state.needsReview = needsReview;
    state.noMapping = noMapping;
    state.outputBySupplier = outputBySupplier;
    state.fullOutput = fullOutput;

    setProgressVal(100,'완료!');
    setTimeout(()=>{
      setProgress(false);
      renderResult(result, needsReview, noMapping, validation, outputBySupplier);
    }, 400);

  } catch(e) {
    setProgress(false);
    showError(`오류 발생: ${e.message}`);
    console.error(e);
  } finally {
    document.getElementById('generateBtn').disabled=false;
  }
}

function setProgress(show) {
  document.getElementById('progressWrap').style.display = show ? 'block' : 'none';
}
function setProgressVal(pct, text) {
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=text;
}
function showError(msg) {
  const el=document.getElementById('errorBox');
  el.textContent=msg; el.style.display='block';
}

// ═══════════════════════════════════════════════
// 결과 렌더링
// ═══════════════════════════════════════════════
function renderResult(result, needsReview, noMapping, validation, outputBySupplier) {
  const section = document.getElementById('resultSection');
  section.style.display='block';

  // Meta
  document.getElementById('resultMeta').innerHTML = `
    <div class="meta-card">
      <div class="meta-label">거래처 수</div>
      <div class="meta-value">${Object.keys(result).length}<span style="font-size:14px;font-weight:400">개</span></div>
    </div>
    <div class="meta-card">
      <div class="meta-label">주문서 수량</div>
      <div class="meta-value">${validation.주문서_총수량}<span style="font-size:14px;font-weight:400">개</span></div>
    </div>
    <div class="meta-card">
      <div class="meta-label">발주서 수량</div>
      <div class="meta-value ${validation.검수_통과?'ok':'warn'}">${validation.발주서_총수량}<span style="font-size:14px;font-weight:400">개</span></div>
    </div>
  `;

  // Validation
  document.getElementById('validationBanner').innerHTML = validation.검수_통과
    ? `<div class="validation-banner pass"><span class="validation-icon">✅</span> 검수 통과 — 주문서 ${validation.주문서_총수량}개 = 발주서 ${validation.발주서_총수량}개</div>`
    : `<div class="validation-banner fail"><span class="validation-icon">⚠️</span> 수량 불일치 — 차이 ${validation.차이}개 (주문서 ${validation.주문서_총수량} vs 발주서 ${validation.발주서_총수량})</div>`;

  // Tabs
  const suppliers = Object.keys(result).sort();
  const tabsEl = document.getElementById('supplierTabs');
  tabsEl.innerHTML = '';
  if (suppliers.length) {
    for (const s of suppliers) {
      const btn = document.createElement('button');
      btn.className='tab'; btn.textContent=s;
      btn.onclick=()=>selectTab(s);
      tabsEl.appendChild(btn);
    }
    selectTab(suppliers[0]);
  }

  // Warnings
  let warnHtml='';
  if (needsReview.length) {
    warnHtml+=`<div class="warning-title">⚠️ 확인 필요 (${needsReview.length}건)</div>`;
    for (const item of needsReview)
      warnHtml+=`<div class="warning-item">상품번호: ${item.상품번호} / 옵션: ${item.옵션} / 수량: ${item.수량} (${item.플랫폼})</div>`;
  }
  if (noMapping.length) {
    warnHtml+=`<div class="warning-title" style="margin-top:16px">❌ 매핑 정보 없음 (${noMapping.length}건)</div>`;
    for (const item of noMapping)
      warnHtml+=`<div class="warning-item">${item.상품번호} / ${item.옵션} / ${item.수량}개 (${item.플랫폼})</div>`;
  }
  document.getElementById('warningSection').innerHTML=warnHtml;

  section.scrollIntoView({behavior:'smooth',block:'start'});
}

function selectTab(supplier) {
  state.currentTab=supplier;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.textContent===supplier);
  });
  document.getElementById('currentSupplierLabel').textContent=supplier;
  document.getElementById('outputBox').textContent=state.outputBySupplier[supplier]||'';
}

function copyCurrentTab() {
  const text = document.getElementById('outputBox').textContent;
  navigator.clipboard.writeText(text).then(()=>showToast('클립보드에 복사했어요!'));
}

function downloadAll() {
  const today = new Date();
  const mm=String(today.getMonth()+1).padStart(2,'0');
  const dd=String(today.getDate()).padStart(2,'0');
  const filename=`발주서_${mm}${dd}.txt`;
  const blob=new Blob([state.fullOutput],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
}
